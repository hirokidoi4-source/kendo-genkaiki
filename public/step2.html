<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>組み合わせ管理 - 少年剣道大会</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans p-6">

    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-end mb-6 border-b pb-4">
            <h1 class="text-2xl font-bold text-indigo-900">📊 組み合わせ管理画面（予選リーグ）</h1>
            <div class="text-sm">
                <span id="saveBtn" class="bg-indigo-600 text-white px-3 py-1 rounded shadow cursor-pointer hover:bg-indigo-700 transition">組み合わせを確定して保存</span>
            </div>
        </div>

        <div class="bg-white p-4 rounded shadow mb-6 flex justify-between items-center">
            <p class="text-gray-600 text-sm">
                💡 チームをドラッグ＆ドロップして、リーグの配置を自由に入れ替えることができます。<br>
                <span class="text-indigo-600 font-bold">※自動計算により、3チームリーグは【1位のみ】、4チームリーグは【2位まで】決勝へ進出します。</span><br>
                <span class="text-red-500 font-bold">※同じリーグ内に同一の「母体団体」が存在する場合、赤く警告されます。</span>
            </p>
            <select id="categorySelect" onchange="loadTeamsAndRender()" class="border border-gray-300 rounded p-2 text-sm focus:ring-indigo-500">
                <option value="low_elem">① 小学生低学年</option>
                <option value="elem">② 小学生団体</option>
                <option value="mid">③ 中学生団体</option>
                <option value="mid_girls">④ 中学女子団体</option>
            </select>
        </div>

        <!-- 🌟 動的に生成されたリーグボックスが配置されるエリア -->
        <div id="dynamicLeagueWrapper" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6"></div>
        
        <!-- 🗑️ 欠場・除外エリア -->
        <div class="bg-white rounded-lg shadow border border-gray-200">
            <div class="bg-gray-300 text-gray-700 font-bold px-4 py-2 rounded-t-lg">🗑️ 欠場・除外エリア（ここにあるチームは対戦カードから除外されます）</div>
            <ul id="leagueTrash" class="sortable-list min-h-[100px] p-2 space-y-2"></ul>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let sortableInstances = [];

            // === 1. バックエンドの試合データからリーグ情報を抽出して画面を生成 ===
            window.loadTeamsAndRender = async () => {
                const category = document.getElementById('categorySelect').value;
                const wrapper = document.getElementById('dynamicLeagueWrapper');
                wrapper.innerHTML = '';
                document.getElementById('leagueTrash').innerHTML = '';
                
                // 既存のSortableJSインスタンスをすべて破棄
                sortableInstances.forEach(ins => ins.destroy());
                sortableInstances = [];

                try {
                    // 1. まず全試合データを取得し、該当部門の予選リーグ試合を抽出
                    const matchRes = await fetch('/api/matches');
                    const allMatches = await matchRes.json();
                    const currentMatches = allMatches.filter(m => m.category === category && m.stage === '予選リーグ');

                    // 2. 全チームのマスターデータを取得（母体情報を引くため）
                    const teamRes = await fetch('/api/teams');
                    const allTeams = await teamRes.json();
                    const teamMasterMap = {};
                    allTeams.filter(t => t.category === category).forEach(t => {
                        teamMasterMap[t.team_name] = t.organization;
                    });

                    if (currentMatches.length === 0) {
                        wrapper.innerHTML = `<div class="md:col-span-3 text-center p-8 text-gray-500 bg-white rounded shadow">選択した部門の予選リーグ対戦表がまだ生成されていません。管理画面で「予選リーグ生成」を行ってください。</div>`;
                        return;
                    }

                    // 3. 試合データからリーグごとに所属するユニークなチーム名を収集
                    const leagueGroupedMap = {};
                    currentMatches.forEach(m => {
                        let details = m.details;
                        if (typeof details === 'string') {
                            try { details = JSON.parse(details); } catch(e) { details = {}; }
                        }
                        const leagueName = (details && details.league) ? details.league : '不明なリーグ';
                        
                        if (!leagueGroupedMap[leagueName]) {
                            leagueGroupedMap[leagueName] = new Set();
                        }
                        if (m.teamA && m.teamA !== '（不戦勝枠）') leagueGroupedMap[leagueName].add(m.teamA);
                        if (m.teamB && m.teamB !== '（不戦勝枠）') leagueGroupedMap[leagueName].add(m.teamB);
                    });

                    // リーグ名をアルファベット順にソートして画面にHTML枠を動的作成！🎨
                    const sortedLeagueNames = Object.keys(leagueGroupedMap).sort();

                    sortedLeagueNames.forEach((leagueName) => {
                        const uniqueTeams = Array.from(leagueGroupedMap[leagueName]);
                        const leagueSize = uniqueTeams.length; // 実際のチーム数

                        // HTML構造を組み立て
                        const leagueBox = document.createElement('div');
                        leagueBox.className = "bg-white rounded-lg shadow border border-gray-200";
                        
                        // 3チームか4チームかによってバッジの色や進出数を可視化
                        const maxPromoted = leagueSize <= 3 ? 1 : 2;
                        const badgeColor = maxPromoted === 2 ? 'bg-amber-500' : 'bg-indigo-500';

                        leagueBox.innerHTML = `
                            <div class="bg-indigo-100 text-indigo-800 font-bold px-4 py-2 rounded-t-lg border-b border-indigo-200 flex justify-between items-center">
                                <span>${leagueName}</span>
                                <span class="text-xs text-white ${badgeColor} px-2 py-0.5 rounded-full font-normal">決勝進出: ${maxPromoted}枠</span>
                            </div>
                            <ul id="list-${leagueName}" data-leaguename="${leagueName}" class="sortable-list min-h-[150px] p-2 space-y-2"></ul>
                        `;

                        wrapper.appendChild(leagueBox);

                        // チームアイテムを各枠のリスト（ul）に追加
                        const ul = document.getElementById(`list-${leagueName}`);
                        uniqueTeams.forEach(teamName => {
                            const org = teamMasterMap[teamName] || 'なし';
                            const li = document.createElement('li');
                            li.className = "bg-gray-50 border border-gray-300 p-3 rounded cursor-move hover:bg-indigo-50 transition shadow-sm";
                            li.setAttribute('data-org', org);
                            li.setAttribute('data-team', teamName);
                            li.innerHTML = `
                                <div class="font-bold text-lg">${teamName}</div>
                                <div class="text-xs text-gray-500">母体: ${org}</div>
                            `;
                            ul.appendChild(li);
                        });
                    });

                    // ドラッグ可能にするための初期化処理を全リストに適応
                    const lists = document.querySelectorAll('.sortable-list');
                    lists.forEach(list => {
                        const ins = new Sortable(list, {
                            group: 'shared',
                            animation: 150,
                            ghostClass: 'bg-indigo-200',
                            onEnd: function () {
                                checkDuplicates();
                            }
                        });
                        sortableInstances.push(ins);
                    });

                    checkDuplicates();
                } catch (err) {
                    console.error("予選リーグ取得エラー", err);
                    alert("サーバーから予選リーグの対戦データを取得できませんでした。");
                }
            };

            // === 2. 同一母体の重複警告チェック ===
            const checkDuplicates = () => {
                const lists = document.querySelectorAll('.sortable-list');
                lists.forEach(list => {
                    if (list.id === 'leagueTrash') return;

                    const items = Array.from(list.children);
                    const orgCount = {};
                    
                    items.forEach(item => {
                        item.classList.remove('border-red-500', 'bg-red-50');
                        item.classList.add('border-gray-300', 'bg-gray-50');
                        const alertMark = item.querySelector('.alert-mark');
                        if (alertMark) alertMark.remove();
                    });

                    items.forEach(item => {
                        const org = item.getAttribute('data-org');
                        if (org && org !== 'なし') {
                            orgCount[org] = (orgCount[org] || 0) + 1;
                        }
                    });

                    items.forEach(item => {
                        const org = item.getAttribute('data-org');
                        if (org && org !== 'なし' && orgCount[org] > 1) {
                            item.classList.remove('border-gray-300', 'bg-gray-50');
                            item.classList.add('border-red-500', 'bg-red-50');
                            
                            if (!item.querySelector('.alert-mark')) {
                                const alertMark = document.createElement('span');
                                alertMark.className = 'alert-mark text-red-500 text-xs font-bold float-right';
                                alertMark.innerText = '⚠️ 同門対決';
                                item.firstElementChild.appendChild(alertMark);
                            }
                        }
                    });
                });
            };

            // === 3. 「組み合わせを確定して保存」ボタンの処理（重複を除去し1つに集約） ===
            document.getElementById('saveBtn').addEventListener('click', async () => {
                const category = document.getElementById('categorySelect').value;
                const matches = [];
                const blocksData = [];
                
                const leagueLists = document.querySelectorAll('#dynamicLeagueWrapper .sortable-list');

                leagueLists.forEach(list => {
                    const leagueName = list.getAttribute('data-leaguename');
                    const items = Array.from(list.children);
                    
                    const teamsInLeague = items.map(li => ({
                        team_name: li.getAttribute('data-team'),
                        organization: li.getAttribute('data-org')
                    }));

                    if (teamsInLeague.length === 0) return;

                    blocksData.push({
                        league: leagueName,
                        teams: teamsInLeague.map(t => t.team_name)
                    });

                    let targetSize = teamsInLeague.length > 3 ? 4 : 3;
                    
                    while (teamsInLeague.length < targetSize) {
                        teamsInLeague.push({ team_name: '（不戦勝枠）', organization: 'なし' });
                    }

                    const maxPromoted = targetSize === 4 ? 2 : 1;
                    let matchCount = 1;

                    for (let i = 0; i < teamsInLeague.length; i++) {
                        for (let j = i + 1; j < teamsInLeague.length; j++) {
                            const teamA = teamsInLeague[i].team_name;
                            const teamB = teamsInLeague[j].team_name;
                            const isBye = teamA === '（不戦勝枠）' || teamB === '（不戦勝枠）';
                            const isSameOrg = teamsInLeague[i].organization === teamsInLeague[j].organization;

                            matches.push({
                                category: category,
                                stage: '予選リーグ',
                                title: `${leagueName} 第${matchCount}試合`,
                                teamA,
                                teamB,
                                scoreA: teamA === '（不戦勝枠）' ? 0 : (isBye ? 1 : 0),
                                scoreB: teamB === '（不戦勝枠）' ? 0 : (isBye ? 1 : 0),
                                status: isBye ? 'finished' : 'scheduled',
                                details: { 
                                    same_org: isSameOrg, 
                                    league: leagueName, 
                                    round: matchCount,
                                    league_size: targetSize,
                                    max_promoted: maxPromoted 
                                }
                            });
                            matchCount++;
                        }
                    }
                });

                if (matches.length === 0) {
                    alert('配置されたチームがありません。');
                    return;
                }

                if (!confirm(`組み替えた配置をもとに予選リーグの総当たり表（計 ${matches.length} 試合）を確定して保存しますか？`)) {
                    return;
                }

                localStorage.setItem(`kendo_league_blocks_${category}`, JSON.stringify(blocksData));
                localStorage.setItem(`kendo_matches_${category}`, JSON.stringify(matches));

                const btn = document.getElementById('saveBtn');
                try {
                    btn.innerText = '保存中...';
                    btn.classList.add('opacity-50', 'cursor-not-allowed');

                    const res = await fetch('/api/tournament/save_league', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ category, matches, blocks: blocksData })
                    });
                    const result = await res.json();
                    
                    if (result.success) {
                        alert('🎉 予選リーグの組み合わせを確定しました！結果入力画面へ移動します。');
                        window.location.href = '/step3_visual.html';
                    } else {
                        alert('❌ 保存エラー: ' + result.error);
                    }
                } catch (err) {
                    console.error(err);
                    alert('⚠️ サーバー通信に失敗しましたが、ローカルデータを更新して結果入力画面へ移動します。');
                    window.location.href = '/step3_visual.html';
                } finally {
                    btn.innerText = '組み合わせを確定して保存';
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            });

            // 初期ロード実行
            loadTeamsAndRender();
        });
    </script>
</body>
</html>
