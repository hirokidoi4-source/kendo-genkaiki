<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>決勝トーナメント配置 - 少年剣道大会</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-end mb-6 border-b pb-4">
            <div>
                <h1 class="text-2xl font-bold text-indigo-900">🏆 決勝トーナメント 組み合わせ管理</h1>
                <p class="text-xs text-gray-500 mt-1">予選の結果から自動で進出チームを算出。同門を避けたトーナメント表を即座に構築します。</p>
            </div>
            <div class="flex gap-3 items-center">
                <!-- 💡 href は JavaScript (loadCategoryTeams) 内で動的に ?category=... を付与します -->
                <a id="jumpToStep3Btn" href="/final_input.html" class="hidden bg-orange-500 hover:bg-orange-600 text-white font-black py-2 px-5 rounded shadow animate-bounce transition flex items-center gap-1 text-sm">
                    📝 そのまま試合結果入力へ進む ➔
                </a>
                <button id="saveBtn" class="bg-indigo-600 text-white font-bold py-2 px-6 rounded shadow hover:bg-indigo-700 transition">
                    この配置でトーナメント表を確定
                </button>
            </div>
        </div>

        <div class="bg-white p-5 rounded-xl shadow-sm mb-6 border border-gray-200">
            <h2 class="text-sm font-bold text-indigo-900 mb-3 flex items-center gap-1">
                ⚡ 予選通過チームの選択 <span id="modeBadge" class="text-xs bg-indigo-100 text-indigo-800 px-2 py-0.5 rounded ml-2">モード判定中...</span>
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">対象部門</label>
                    <select id="categorySelect" onchange="loadCategoryTeams()" class="w-full border border-gray-300 rounded p-2 text-sm font-bold focus:ring-indigo-500">
                        <option value="low_elem">① 小学生低学年</option>
                        <option value="elem">② 小学生団体</option>
                        <option value="mid">③ 中学生団体</option>
                        <option value="mid_girls">④ 中学女子団体</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button onclick="autoDrawFinals()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded shadow text-sm transition flex justify-center items-center gap-1">
                        🎯 同門隔離：自動抽選を実行
                    </button>
                </div>
            </div>

            <div class="bg-gray-50 p-4 rounded-lg border border-dashed">
                <p id="selectorTitle" class="text-[11px] text-gray-500 font-bold mb-3">▼ 予選結果に基づき、自動選出されています（手動微調整も可能）</p>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4" id="slotSelectorContainer"></div>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-8">
            <div class="flex-1 bg-white rounded-lg shadow-md border border-gray-200">
                <div class="bg-indigo-800 text-white font-bold px-4 py-3 rounded-t-lg text-center text-sm tracking-wider">
                    ◀ 左の山（Aブロック）
                </div>
                <div class="p-4 bg-indigo-50/30">
                    <ul id="leftBracket" class="sortable-list space-y-3 min-h-[180px]"></ul>
                </div>
            </div>

            <div class="flex-1 bg-white rounded-lg shadow-md border border-gray-200">
                <div class="bg-red-800 text-white font-bold px-4 py-3 rounded-t-lg text-center text-sm tracking-wider">
                    右の山（Bブロック） ▶
                </div>
                <div class="p-4 bg-red-50/30">
                    <ul id="rightBracket" class="sortable-list space-y-3 min-h-[180px]"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allTeamsList = []; 
        let allMatchesList = []; 
        const lists = document.querySelectorAll('.sortable-list');

        const loadCategoryTeams = async () => {
            const category = document.getElementById('categorySelect').value;
            const slotContainer = document.getElementById('slotSelectorContainer');
            const modeBadge = document.getElementById('modeBadge');
            const selectorTitle = document.getElementById('selectorTitle');
            
            // 💡 カテゴリ変更時にボタンのリンク先パラメータも更新
            const jumpBtn = document.getElementById('jumpToStep3Btn');
            if (jumpBtn) jumpBtn.href = `/final_input.html?category=${category}`;

            slotContainer.innerHTML = ''; 

            try {
                if (allTeamsList.length === 0) {
                    const res = await fetch('/api/teams');
                    allTeamsList = await res.json();
                }
                const resMatches = await fetch('/api/matches');
                allMatchesList = await resMatches.json();

                const filteredTeams = allTeamsList.filter(t => t.category === category);
                const leagueMatches = allMatchesList.filter(m => m.category === category && m.stage === '予選リーグ');

                if (leagueMatches.length === 0) {
                    modeBadge.innerText = '予選なし：ストレートTモード 🎌';
                    modeBadge.className = 'text-xs bg-amber-100 text-amber-800 px-2 py-0.5 rounded ml-2 font-bold';
                    selectorTitle.innerText = '▼ 登録チーム一覧からトーナメントに出場するチームを順に選択してください';

                    const slotCount = Math.max(4, filteredTeams.length);
                    for (let i = 0; i < slotCount; i++) {
                        createSlotSelect(slotContainer, `slot_${i}`, `エントリー枠 ${i + 1}`, filteredTeams, filteredTeams[i]?.team_name || '');
                    }
                } else {
                    modeBadge.innerText = '予選連動モード ⚡';
                    modeBadge.className = 'text-xs bg-indigo-100 text-indigo-800 px-2 py-0.5 rounded ml-2 font-bold';
                    selectorTitle.innerText = '▼ 予選結果（勝者数）に基づき、自動選出されています（同点時の手動調整も可能）';

                    const teamStats = {};
                    const leagueMaxPromotedMap = {};

                    filteredTeams.forEach(t => {
                        teamStats[t.team_name] = { wins: 0, team: t, league: '不明' };
                    });

                    leagueMatches.forEach(m => {
                        const leagueName = m.details && m.details.league ? m.details.league : 'Aリーグ';
                        
                        if (m.details && m.details.max_promoted !== undefined) {
                            leagueMaxPromotedMap[leagueName] = m.details.max_promoted;
                        }

                        if (!teamStats[m.teamA]) teamStats[m.teamA] = { wins: 0, team: { team_name: m.teamA, organization: '' }, league: leagueName };
                        if (!teamStats[m.teamB]) teamStats[m.teamB] = { wins: 0, team: { team_name: m.teamB, organization: '' }, league: leagueName };
                        
                        teamStats[m.teamA].league = leagueName;
                        teamStats[m.teamB].league = leagueName;

                        let posData = null;
                        if (m.details) {
                            let rawDet = typeof m.details === 'string' ? JSON.parse(m.details) : m.details;
                            posData = Array.isArray(rawDet) ? rawDet : rawDet?.order_list;
                        }
                        if (!posData && m.positions) {
                            posData = typeof m.positions === 'string' ? JSON.parse(m.positions) : m.positions;
                        }

                        if (posData && Array.isArray(posData)) {
                            let redWins = 0, whiteWins = 0;
                            posData.forEach(pos => {
                                const rCount = (pos.red || []).filter(p => p !== '▲' && p !== 'CLEAR' && p !== '引分').length;
                                const wCount = (pos.white || []).filter(p => p !== '▲' && p !== 'CLEAR' && p !== '引分').length;
                                if (rCount > wCount) redWins++;
                                else if (wCount > rCount) whiteWins++;
                            });

                            if (redWins > whiteWins) teamStats[m.teamA].wins += 3;
                            else if (whiteWins > redWins) teamStats[m.teamB].wins += 3;
                            else if (redWins > 0 || whiteWins > 0) {
                                teamStats[m.teamA].wins += 1;
                                teamStats[m.teamB].wins += 1;
                            }
                        } else if (m.status === 'finished') {
                            if (m.scoreA > m.scoreB) teamStats[m.teamA].wins += 3;
                            else if (m.scoreB > m.scoreA) teamStats[m.teamB].wins += 3;
                            else {
                                teamStats[m.teamA].wins += 1;
                                teamStats[m.teamB].wins += 1;
                            }
                        }
                    });

                    const leagues = {};
                    Object.values(teamStats).forEach(stat => {
                        if (stat.league === '不明') return;
                        if (!leagues[stat.league]) leagues[stat.league] = [];
                        leagues[stat.league].push(stat);
                    });

                    const sortedLeagueNames = Object.keys(leagues).sort();
                    let slotIdx = 0;

                    sortedLeagueNames.forEach(lName => {
                        leagues[lName].sort((a, b) => b.wins - a.wins);

                        const firstTeam = leagues[lName][0]?.team.team_name || '';
                        const secondTeam = leagues[lName][1]?.team.team_name || '';

                        createSlotSelect(slotContainer, `slot_${slotIdx}`, `${lName} 1位`, filteredTeams, firstTeam);
                        slotIdx++;

                        const maxPromoted = leagueMaxPromotedMap[lName] !== undefined ? leagueMaxPromotedMap[lName] : 2; 
                        if (maxPromoted >= 2) {
                            createSlotSelect(slotContainer, `slot_${slotIdx}`, `${lName} 2位`, filteredTeams, secondTeam);
                            slotIdx++;
                        }
                    });
                }

                document.getElementById('leftBracket').innerHTML = '';
                document.getElementById('rightBracket').innerHTML = '';

            } catch (err) {
                console.error(err);
            }
        };

        const createSlotSelect = (container, id, labelText, teams, defaultValue) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'bg-white p-2 rounded border shadow-sm';
            wrapper.innerHTML = `<label class="block text-xs font-bold text-gray-600 mb-1">${labelText}</label>`;

            const select = document.createElement('select');
            select.id = id;
            select.className = 'team-slot-select w-full border p-1 rounded text-xs bg-white focus:ring-indigo-500 font-medium';
            select.innerHTML = '<option value="">-- 未選出（空枠） --</option>';

            select.addEventListener('change', () => {
                const selectedOpt = select.options[select.selectedIndex];
                const newTeamName = select.value;
                const newOrg = selectedOpt ? selectedOpt.getAttribute('data-org') : '';

                const targetLi = document.querySelector(`li[data-slot-source="${id}"]`);
                if (targetLi) {
                    if (newTeamName) {
                        targetLi.setAttribute('data-team', newTeamName);
                        targetLi.setAttribute('data-org', newOrg);
                        targetLi.innerHTML = `
                            <div>
                                <span class="badge text-xs font-bold text-indigo-600 bg-indigo-100 px-2 py-1 rounded mr-2">枠 -</span>
                                <span class="font-bold text-base text-gray-900">${newTeamName}</span>
                            </div>
                            <span class="text-xs text-gray-400">母体: ${newOrg}</span>
                        `;
                    } else {
                        targetLi.remove();
                    }
                    refreshBracketIndexAndCheck();
                } else {
                    autoDrawFinals();
                }
            });

            teams.forEach(team => {
                const opt = document.createElement('option');
                opt.value = team.team_name;
                opt.setAttribute('data-org', team.organization);
                opt.innerText = `${team.team_name} (${team.organization})`;
                if (team.team_name === defaultValue) opt.selected = true;
                select.appendChild(opt);
            });

            wrapper.appendChild(select);
            container.appendChild(wrapper);
        };

        window.autoDrawFinals = () => {
            const selectedTeams = [];
            const selects = document.querySelectorAll('.team-slot-select');

            selects.forEach(select => {
                if (select.value) {
                    const selectedOpt = select.options[select.selectedIndex];
                    selectedTeams.push({
                        slot_id: select.id, 
                        team_name: select.value,
                        organization: selectedOpt.getAttribute('data-org')
                    });
                }
            });

            if (selectedTeams.length === 0) {
                alert("進出チームが選択されていません。手動でプルダウンを選んでから実行してください。");
                return;
            }

            const orgGroups = {};
            selectedTeams.forEach(t => {
                if (!orgGroups[t.organization]) orgGroups[t.organization] = [];
                orgGroups[t.organization].push(t);
            });

            const leftBracketTeams = [];
            const rightBracketTeams = [];
            let flipToggle = true;

            Object.keys(orgGroups).forEach(org => {
                const group = orgGroups[org];
                group.forEach((team, index) => {
                    if (index % 2 === 0) {
                        if (flipToggle) leftBracketTeams.push(team);
                        else rightBracketTeams.push(team);
                    } else {
                        if (flipToggle) rightBracketTeams.push(team);
                        else leftBracketTeams.push(team);
                    }
                });
                flipToggle = !flipToggle;
            });

            const allAssigned = [...leftBracketTeams, ...rightBracketTeams];
            const finalLeft = [];
            const finalRight = [];
            allAssigned.forEach((team, idx) => {
                if (idx % 2 === 0) finalLeft.push(team);
                else finalRight.push(team);
            });

            renderBracket('leftBracket', finalLeft);
            renderBracket('rightBracket', finalRight);

            refreshBracketIndexAndCheck();
        };

        const renderBracket = (elementId, teamsArray) => {
            const ul = document.getElementById(elementId);
            ul.innerHTML = '';
            teamsArray.forEach(team => {
                const li = document.createElement('li');
                li.className = "bg-white border border-gray-300 p-3 rounded cursor-move hover:border-indigo-500 hover:shadow-md transition flex items-center justify-between";
                li.setAttribute('data-org', team.organization);
                li.setAttribute('data-team', team.team_name);
                li.setAttribute('data-slot-source', team.slot_id || ''); 
                li.innerHTML = `
                    <div>
                        <span class="badge text-xs font-bold text-indigo-600 bg-indigo-100 px-2 py-1 rounded mr-2">枠 -</span>
                        <span class="font-bold text-base text-gray-900">${team.team_name}</span>
                    </div>
                    <span class="text-xs text-gray-400">母体: ${team.organization}</span>
                `;
                ul.appendChild(li);
            });
        };

        const refreshBracketIndexAndCheck = () => {
            let totalIndex = 1;

            lists.forEach(list => {
                const items = Array.from(list.children);
                const orgCount = {};

                items.forEach(item => {
                    item.classList.remove('border-red-500', 'bg-red-50');
                    const badge = item.querySelector('.badge');
                    badge.innerText = `枠 ${totalIndex}`;
                    totalIndex++;
                    
                    const alertMark = item.querySelector('.alert-mark');
                    if (alertMark) alertMark.remove();

                    const org = item.getAttribute('data-org');
                    orgCount[org] = (orgCount[org] || 0) + 1;
                });

                items.forEach(item => {
                    const org = item.getAttribute('data-org');
                    if (orgCount[org] > 1) {
                        item.classList.add('border-red-500', 'bg-red-50');
                        if (!item.querySelector('.alert-mark')) {
                            const alertMark = document.createElement('span');
                            alertMark.className = 'alert-mark text-red-500 text-xs font-bold ml-2';
                            alertMark.innerText = '⚠️ 同門近接';
                            item.firstElementChild.appendChild(alertMark);
                        }
                    }
                });
            });
        };

        lists.forEach(list => {
            new Sortable(list, {
                group: 'tournament',
                animation: 150,
                ghostClass: 'opacity-40',
                onEnd: function () {
                    refreshBracketIndexAndCheck();
                }
            });
        });

        // 💡 決勝トーナメント確定ボタンのリスナー処理
        document.getElementById('saveBtn').addEventListener('click', async () => {
            const category = document.getElementById('categorySelect').value;
            
            const leftItems = Array.from(document.getElementById('leftBracket').children).map(li => ({
                team_name: li.getAttribute('data-team'),
                organization: li.getAttribute('data-org')
            }));
            const rightItems = Array.from(document.getElementById('rightBracket').children).map(li => ({
                team_name: li.getAttribute('data-team'),
                organization: li.getAttribute('data-org')
            }));

            const finalSortedTeams = [...leftItems, ...rightItems];

            if (finalSortedTeams.length < 2) {
                alert("決勝トーナメントに進出するチーム数が足りません。左右の山にチームを配置してください。");
                return;
            }

            if (!confirm(`現在配置されている ${finalSortedTeams.length} チームで決勝トーナメントを確定保存します。よろしいですか？`)) {
                return;
            }

            try {
                const btn = document.getElementById('saveBtn');
                btn.innerText = 'トーナメント構築中...';
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                btn.style.pointerEvents = 'none';

                // 💡 /api/tournament/generate を呼び出してシード処理＆自動進出を含めて生成
                const res = await fetch('/api/tournament/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        category: category, 
                        type: 'final', 
                        teams: finalSortedTeams.map(t => t.team_name) 
                    })
                });
                const result = await res.json();

                if (result && result.success === true) {
                    alert(`🏆 決勝トーナメント表を確定・生成しました！`);
                    window.location.href = `/final_input.html?category=${category}`;
                } else {
                    const errorMsg = result ? (result.error || result.message) : '応答データが不正です';
                    alert('❌ 保存エラー: ' + errorMsg);
                }            } catch (err) {
                console.error(err);
                alert('通信エラーが発生しました。');
            } finally {
                const btn = document.getElementById('saveBtn');
                btn.innerText = 'この配置でトーナメント表を確定';
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.style.pointerEvents = 'auto';
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            loadCategoryTeams();
        });
    </script>
</body>
</html>
