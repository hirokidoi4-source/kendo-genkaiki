<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大会結果速報 - 少年剣道大会</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .highlight-card {
            border: 4px solid #eab308 !important;
            background-color: #fef9c3 !important;
            transform: scale(1.03);
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(234, 179, 8, 0.3);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <header class="bg-indigo-900 text-white p-4 shadow-md sticky top-0 z-20 flex justify-between items-center">
        <h1 class="text-lg md:text-xl font-bold">🎌 <span id="tournamentTitle">少年剣道大会 速報</span></h1>
        <span class="text-xs bg-indigo-800 px-2 py-1 rounded border border-indigo-700 animate-pulse">自動更新中 🟢</span>
    </header>

    <!-- 🏆 最終結果ブロック -->
    <div id="finalResults" class="hidden bg-white p-6 shadow-md border-b-4 border-red-600 mb-2">
        <h2 class="text-2xl font-black text-center text-red-700 mb-6 pb-2 inline-block mx-auto flex justify-center border-b-2 border-red-100">
            🏆 大会最終結果 🏆
        </h2>
        <div class="space-y-4 max-w-2xl mx-auto">
            <div class="bg-gradient-to-r from-yellow-100 to-yellow-50 border-2 border-yellow-400 rounded-xl p-4 text-center shadow-md">
                <div class="text-yellow-600 font-black text-sm mb-1">🥇 優勝</div>
                <div class="text-2xl md:text-3xl font-black text-gray-900" id="resWinner">-</div>
            </div>
        </div>
    </div>

    <!-- 🔍 マイチーム検索 -->
    <div class="bg-white p-4 shadow-sm border-b">
        <div class="max-w-md mx-auto">
            <label class="block text-xs font-bold text-indigo-900 mb-1">🔍 マイチーム（道場・学校名）を検索・マーク</label>
            <div class="relative">
                <input type="text" id="teamSearchInput" oninput="highlightMyTeam()" placeholder="例: 福岡武道館、桜剣友会..." class="w-full pl-10 pr-4 py-2 border-2 border-indigo-200 rounded-lg focus:outline-none focus:border-indigo-600 font-bold text-base shadow-sm">
                <span class="absolute left-3 top-2.5 text-gray-400 text-base">🔍</span>
            </div>
        </div>
    </div>

    <!-- 📂 部門選択タブ -->
    <div class="bg-white shadow-sm sticky top-[60px] z-10 overflow-x-auto no-scrollbar border-b border-gray-200">
        <div class="flex whitespace-nowrap px-2 py-2 gap-2 min-w-max">
            <button onclick="switchCategory('low_elem')" id="tab_low_elem" class="category-tab px-4 py-2 rounded-full text-sm font-bold bg-indigo-600 text-white transition">① 小学生低学年</button>
            <button onclick="switchCategory('elem')" id="tab_elem" class="category-tab px-4 py-2 rounded-full text-sm font-bold bg-gray-100 text-gray-600 hover:bg-gray-200 transition">② 小学生団体</button>
            <button onclick="switchCategory('mid')" id="tab_mid" class="category-tab px-4 py-2 rounded-full text-sm font-bold bg-gray-100 text-gray-600 hover:bg-gray-200 transition">③ 中学生団体</button>
            <button onclick="switchCategory('mid_girls')" id="tab_mid_girls" class="category-tab px-4 py-2 rounded-full text-sm font-bold bg-gray-100 text-gray-600 hover:bg-gray-200 transition">④ 中学女子団体</button>
        </div>
    </div>

    <!-- ⚔️ 予選 / 決勝 切り替え -->
    <div id="stageTabContainer" class="bg-gray-100 p-2 flex justify-center gap-4 border-b border-gray-200">
        <button onclick="switchStage('league')" id="tab_league" class="stage-tab pb-2 px-2 text-sm font-bold text-indigo-600 border-b-2 border-indigo-600 transition">予選リーグ</button>
        <button onclick="switchStage('tournament')" id="tab_tournament" class="stage-tab pb-2 px-2 text-sm font-bold text-gray-500 border-b-2 border-transparent hover:text-gray-700 transition">決勝トーナメント</button>
    </div>

    <!-- 📊 各リーグの所属チーム一覧 -->
    <div id="leagueMembersArea" class="max-w-4xl mx-auto px-4 mt-4">
        <div class="bg-indigo-50 border border-indigo-100 rounded-lg p-3">
            <h3 class="text-xs font-bold text-indigo-900 mb-2 flex items-center gap-1">📋 各リーグの所属チーム一覧</h3>
            <div id="leagueGroupList" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 text-xs"></div>
        </div>
    </div>

    <!-- 試合カード・ツリー描画メインエリア -->
    <main class="p-4 max-w-5xl mx-auto pb-20" id="mainContent">
    </main>

    <!-- モーダル詳細 -->
    <div id="matchModal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl w-full max-w-md overflow-hidden shadow-2xl">
            <div class="bg-indigo-900 text-white p-3 flex justify-between items-center">
                <span class="font-bold text-sm" id="modalTitle">試合詳細スコア</span>
                <button onclick="closeModal()" class="text-white hover:text-gray-300 font-bold text-xl leading-none">&times;</button>
            </div>
            <div class="p-4 bg-gray-50 border-b border-gray-200 flex justify-between items-center text-center">
                <div class="w-5/12 font-black text-lg text-indigo-700 truncate" id="modalTeamA"></div>
                <div class="w-2/12 font-bold text-gray-400 text-sm">VS</div>
                <div class="w-5/12 font-black text-lg text-indigo-700 truncate" id="modalTeamB"></div>
            </div>
            <div class="px-4 py-2 bg-white flex justify-between items-center text-center border-b">
                <div class="w-5/12 text-3xl font-black text-slate-800" id="modalScoreA">0</div>
                <div class="w-2/12 text-xs text-gray-400 font-bold">勝者数</div>
                <div class="w-5/12 text-3xl font-black text-slate-800" id="modalScoreB">0</div>
            </div>
            <div class="p-4 bg-white space-y-2 font-medium" id="modalDetails"></div>
            <div class="p-4 bg-gray-50 text-center">
                <button onclick="closeModal()" class="w-full bg-gray-300 text-gray-700 font-bold py-2.5 rounded-lg hover:bg-gray-400 transition">閉じる</button>
            </div>
        </div>
    </div>

    <script>
        let currentCategory = 'low_elem';
        let currentStage = 'league';
        let allMatches = [];

        const fetchMatchData = async () => {
            try {
                const resResults = await fetch('/api/results');
                const finalData = await resResults.json();
                if (finalData.title) document.getElementById('tournamentTitle').innerText = finalData.title + ' 速報';

                const resMatches = await fetch('/api/matches');
                allMatches = await resMatches.json();
                 
                renderLeagueOverview();
                renderContent();       
                highlightMyTeam();     
            } catch (error) {
                console.error("データの同期に失敗しました", error);
            }
        };

        const switchCategory = (category) => {
            currentCategory = category;
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.className = 'category-tab px-4 py-2 rounded-full text-sm font-bold bg-gray-100 text-gray-600 hover:bg-gray-200 transition';
            });
            document.getElementById(`tab_${category}`).className = 'category-tab px-4 py-2 rounded-full text-sm font-bold bg-indigo-600 text-white transition';
            renderContent();
            renderLeagueOverview();
        };

        const switchStage = (stage) => {
            currentStage = stage;
            document.querySelectorAll('.stage-tab').forEach(tab => {
                tab.className = 'stage-tab pb-2 px-2 text-sm font-bold text-gray-500 border-b-2 border-transparent hover:text-gray-700 transition';
            });
            document.getElementById(`tab_${stage}`).className = 'stage-tab pb-2 px-2 text-sm font-bold text-indigo-600 border-b-2 border-indigo-600 transition';
            
            document.getElementById('leagueMembersArea').style.display = stage === 'tournament' ? 'none' : 'block';
            renderContent();
            highlightMyTeam();
        };

        const renderLeagueOverview = () => {
            const listDiv = document.getElementById('leagueGroupList');
            listDiv.innerHTML = '';
            if (currentStage !== 'league') return;

            const filtered = allMatches.filter(m => m.category === currentCategory && m.stage === '予選リーグ');
            const groups = {};

            filtered.forEach(m => {
                const leagueName = m.details && m.details.league ? m.details.league : 'Aリーグ';
                if (!groups[leagueName]) {
                    groups[leagueName] = new Set();
                }
                if (m.teamA && m.teamA !== '（不戦勝枠）') groups[leagueName].add(m.teamA);
                if (m.teamB && m.teamB !== '（不戦勝枠）') groups[leagueName].add(m.teamB);
            });

            const sortedLeagueNames = Object.keys(groups).sort();

            if (sortedLeagueNames.length === 0) {
                listDiv.innerHTML = '<div class="text-gray-400 py-2">所属チームがありません。</div>';
                return;
            }

            sortedLeagueNames.forEach(leagueName => {
                const teamSet = groups[leagueName];
                const col = document.createElement('div');
                col.className = "bg-white p-2 rounded shadow-sm border";
                col.innerHTML = `<span class="font-bold text-indigo-700">${leagueName}</span>`;
                 
                const ul = document.createElement('ul');
                ul.className = "mt-1 space-y-0.5 text-gray-600 list-disc list-inside";
                 
                teamSet.forEach(team => { 
                    ul.innerHTML += `<li class="league-team-item truncate" data-team="${team}">${team}</li>`; 
                });
                 
                col.appendChild(ul);
                listDiv.appendChild(col);
            });
        };

        const renderContent = () => {
            const content = document.getElementById('mainContent');
            content.innerHTML = '';

            if (currentStage === 'league') {
                const filteredMatches = allMatches.filter(m => m.category === currentCategory && m.stage === '予選リーグ');
                if (filteredMatches.length === 0) {
                    content.innerHTML = `<div class="bg-white rounded-lg shadow-sm border p-8 text-center text-gray-400 font-bold">予選組み合わせがまだ登録されていません。</div>`;
                    return;
                }
                filteredMatches.sort((a, b) => a.title.localeCompare(b.title));
                filteredMatches.forEach(match => {
                    const card = createMatchCard(match);
                    content.appendChild(card);
                });
            } else {
                const finalMatches = allMatches.filter(m => m.category === currentCategory && m.stage === '決勝トーナメント');
                if (finalMatches.length === 0) {
                    content.innerHTML = `<div class="bg-white rounded-lg shadow-sm border p-8 text-center text-gray-400 font-bold">決勝トーナメント表がまだ確定されていません。</div>`;
                    return;
                }

                // 外側のメインコンテナ自体の幅制限を適切に設定
                document.getElementById('mainContent').className = "p-4 w-full max-w-3xl mx-auto pb-20";

                // 🌟 上部に「決勝トーナメント一覧」の案内を追加
                const headerDiv = document.createElement('div');
                headerDiv.className = "text-center font-black text-sm text-indigo-900 mb-6 border-b-2 border-dashed pb-3 flex justify-center items-center gap-1.5";
                headerDiv.innerHTML = `
                    <span>📊 決勝トーナメント 進行状況一覧</span>
                    <span class="bg-indigo-100 text-indigo-800 text-xs px-2 py-0.5 rounded-full">タップで詳細スコア表示</span>
                `;
                content.appendChild(headerDiv);

                // 🌟 試合を「決勝」「準決勝」「3回戦」「2回戦」「1回戦」などのグループに自動分類します
                const stagesGroup = {
                    '決勝': [],
                    '準決勝': [],
                    '4回戦': [],
                    '3回戦': [],
                    '2回戦': [],
                    '1回戦': [],
                    'その他': []
                };

                finalMatches.forEach(match => {
                    if (match.title.includes('決勝') && !match.title.includes('準決勝')) {
                        stagesGroup['決勝'].push(match);
                    } else if (match.title.includes('準決勝')) {
                        stagesGroup['準決勝'].push(match);
                    } else if (match.title.includes('4回戦')) {
                        stagesGroup['4回戦'].push(match);
                    } else if (match.title.includes('3回戦')) {
                        stagesGroup['3回戦'].push(match);
                    } else if (match.title.includes('2回戦')) {
                        stagesGroup['2回戦'].push(match);
                    } else if (match.title.includes('1回戦')) {
                        stagesGroup['1回戦'].push(match);
                    } else {
                        stagesGroup['その他'].push(match);
                    }
                });

                // 各グループ内を試合番号順にソートするための比較関数
                const sortByMatchNum = (a, b) => {
                    const numA = parseInt(a.title.match(/\d+/)?.[0] || 0);
                    const numB = parseInt(b.title.match(/\d+/)?.[0] || 0);
                    return numA - numB;
                };

                // 🌟 決勝から順に画面にグループごとの見出しを付けて並べていきます
                const order = ['決勝', '準決勝', '4回戦', '3回戦', '2回戦', '1回戦', 'その他'];
                
                order.forEach(stageName => {
                    const matches = stagesGroup[stageName];
                    if (matches.length > 0) {
                        matches.sort(sortByMatchNum);

                        // 回戦ごとの見出しデザインを生成
                        const sectionHeader = document.createElement('div');
                        let badgeColor = "bg-slate-200 text-slate-800";
                        let icon = "🛡️";

                        if (stageName === '決勝') { badgeColor = "bg-amber-100 text-amber-800 border border-amber-300"; icon = "🏆"; }
                        else if (stageName === '準決勝') { badgeColor = "bg-indigo-100 text-indigo-800"; icon = "⚔️"; }

                        sectionHeader.className = `flex items-center gap-2 font-black text-base mt-8 mb-4 px-3 py-1.5 rounded-lg ${badgeColor} w-max shadow-sm`;
                        sectionHeader.innerHTML = `<span>${icon} ${stageName}</span><span class="text-xs opacity-75">(${matches.length}試合)</span>`;
                        content.appendChild(sectionHeader);

                        // その回戦の試合カードを並べる
                        matches.forEach(match => {
                            const card = createMatchCard(match);
                            content.appendChild(card);
                        });
                    }
                });
            }
        };
        const createMatchCard = (match) => {
            const card = document.createElement('div');
            card.className = 'match-card bg-white rounded-xl shadow-md border-2 border-gray-200 mb-4 overflow-hidden cursor-pointer hover:border-indigo-400 hover:shadow-lg transition-all duration-200';
            card.setAttribute('data-team-a', match.teamA);
            card.setAttribute('data-team-b', match.teamB);
            card.onclick = () => openModal(match);

            let statusBadge = '';
            let scoreText = 'VS';
            let scoreColor = 'text-indigo-600';

            if (match.status === 'finished') {
                statusBadge = `<span class="bg-blue-600 text-white text-xs px-2.5 py-0.5 rounded font-black">試合終了</span>`;
                scoreText = `${match.scoreA} - ${match.scoreB}`;
                scoreColor = 'text-gray-900 font-black text-2xl';
            } else if (match.status === 'ongoing') {
                statusBadge = `<span class="bg-red-500 text-white text-xs px-2.5 py-0.5 rounded font-black animate-pulse">試合中 ⚔️</span>`;
                scoreText = `${match.scoreA} - ${match.scoreB}`;
                scoreColor = 'text-red-600 font-black text-2xl';
            } else {
                statusBadge = `<span class="bg-gray-400 text-white text-xs px-2.5 py-0.5 rounded font-black">試合前</span>`;
            }

            card.innerHTML = `
                <div class="bg-gray-50 px-4 py-2 border-b text-sm text-gray-600 font-black flex justify-between items-center">
                    <span>${match.title}</span>
                    ${statusBadge}
                </div>
                <div class="p-4 flex justify-between items-center text-center">
                    <div class="w-5/12 font-black text-lg text-gray-800 truncate">${match.teamA}</div>
                    <div class="w-2/12 flex flex-col items-center">
                        <span class="${scoreColor} px-2 py-0.5 bg-gray-50 border rounded-lg shadow-inner min-w-[60px] text-center">${scoreText}</span>
                    </div>
                    <div class="w-5/12 font-black text-lg text-gray-800 truncate">${match.teamB}</div>
                </div>
            `;
            return card;
        };

        window.openModalById = (matchId) => {
            if(!matchId || matchId === 'undefined') return;
            const match = allMatches.find(m => m.id === matchId);
            if(match) openModal(match);
        };

        const openModal = (match) => {
            document.getElementById('modalTitle').innerText = match.title;
            document.getElementById('modalTeamA').innerText = match.teamA;
            document.getElementById('modalTeamB').innerText = match.teamB;
             
            const hasStarted = match.status === 'finished' || match.status === 'ongoing';
            document.getElementById('modalScoreA').innerText = hasStarted ? match.scoreA : '0';
            document.getElementById('modalScoreB').innerText = hasStarted ? match.scoreB : '0';

            const detailsContainer = document.getElementById('modalDetails');
            detailsContainer.innerHTML = '';

            if (!hasStarted) {
                detailsContainer.innerHTML = '<p class="text-center text-gray-400 py-4 text-sm font-bold">まだ試合が始まっていません</p>';
            } else if (!match.details || !Array.isArray(match.details) || match.details.length === 0) {
                detailsContainer.innerHTML = '<p class="text-center text-gray-500 py-4 text-sm font-bold">詳細データ（先鋒〜大将）が未入力です</p>';
            } else {
                match.details.forEach(detail => {
                    const row = document.createElement('div');
                    row.className = 'flex justify-between items-center py-2 border-b last:border-b-0 text-base';
                     
                    const formatPoint = (pt) => {
                        if(!pt) return '-';
                        if(pt === '引') return `<span class="text-teal-600 font-bold">引</span>`;
                        if(pt.includes('○')) return `<span class="text-orange-600 font-black">${pt}</span>`;
                        if(pt.includes('▲') || pt.includes('▼')) return `<span class="text-red-600 font-bold">${pt}</span>`;
                        return `<span class="text-indigo-800 font-bold">${pt}</span>`;
                    };

                    row.innerHTML = `
                        <div class="w-5/12 flex justify-end gap-2 pr-2">${formatPoint(detail.a1)} ${formatPoint(detail.a2)}</div>
                        <div class="w-2/12 text-center font-black text-gray-500 text-xs bg-gray-100 rounded py-1">${detail.pos}</div>
                        <div class="w-5/12 flex justify-start gap-2 pl-2">${formatPoint(detail.b1)} ${formatPoint(detail.b2)}</div>
                    `;
                    detailsContainer.appendChild(row);
                });
            }
            document.getElementById('matchModal').classList.remove('hidden');
        };

        const closeModal = () => document.getElementById('matchModal').classList.add('hidden');

        window.highlightMyTeam = () => {
            const keyword = document.getElementById('teamSearchInput').value.trim();
            const cards = document.querySelectorAll('.match-card, [data-team-a]');
            const listItems = document.querySelectorAll('.league-team-item');

            cards.forEach(card => card.classList.remove('highlight-card'));
            listItems.forEach(item => item.classList.remove('text-yellow-600', 'font-black', 'bg-yellow-100', 'p-1', 'rounded'));

            if (!keyword) return;

            let firstFoundCard = null;

            cards.forEach(card => {
                const teamA = card.getAttribute('data-team-a') || '';
                const teamB = card.getAttribute('data-team-b') || '';
                if (teamA.includes(keyword) || teamB.includes(keyword)) {
                    card.classList.add('highlight-card');
                    if (!firstFoundCard) firstFoundCard = card;
                }
            });

            listItems.forEach(item => {
                const team = item.getAttribute('data-team');
                if (team && team.includes(keyword)) { 
                    item.classList.add('text-yellow-600', 'font-black', 'bg-yellow-100', 'p-1', 'rounded'); 
                }
            });

            // 🌟【親切機能】検索でヒットした最初のカードの位置まで画面を自動スクロールさせる
            if (firstFoundCard) {
                firstFoundCard.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
            }
        };

        fetchMatchData();
        setInterval(fetchMatchData, 5000);
    </script>
</body>
</html>
