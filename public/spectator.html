<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>少年剣道大会 速報</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal-scroll {
            max-height: calc(88vh - 100px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans">

    <!-- ナビバー -->
    <header class="bg-indigo-950 text-white p-4 shadow-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-lg sm:text-xl font-black flex items-center gap-2">
                ⚔️ 少年剣道大会 速報
            </h1>
            <span class="text-xs bg-emerald-500/20 text-emerald-300 border border-emerald-500/40 px-2.5 py-1 rounded-full font-bold flex items-center gap-1">
                <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span> リアルタイム同期中
            </span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-3 sm:p-6 space-y-6">
        <!-- 試合カード一覧 -->
        <div id="spectatorContainer" class="space-y-6">
            <div class="text-center py-12 text-slate-400 font-bold bg-white rounded-2xl border">速報データを読み込み中...</div>
        </div>
    </main>

    <!-- 対戦詳細モーダル（閲覧用） -->
    <div id="detailModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-2 sm:p-4 hidden">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
            
            <div class="bg-indigo-900 text-white p-3 sm:p-4 flex justify-between items-center shrink-0">
                <h3 id="modalTitle" class="font-bold text-base sm:text-lg">試合詳細</h3>
                <button onclick="closeModal()" class="text-slate-300 hover:text-white text-2xl font-bold px-2">&times;</button>
            </div>

            <div class="p-4 modal-scroll space-y-4">
                <!-- チームヘッダー -->
                <div class="bg-slate-100 rounded-xl p-3 border border-slate-200 flex justify-between items-center text-center">
                    <div class="w-5/12">
                        <div id="modalRedTeam" class="font-black text-sm sm:text-base text-red-700 truncate">赤チーム</div>
                        <div id="modalRedSummary" class="text-xs text-red-600 font-bold mt-0.5">0勝 (0本)</div>
                    </div>
                    <div class="w-2/12 flex flex-col items-center">
                        <span class="font-black text-xs text-slate-400">VS</span>
                        <span id="modalResultBadge" class="mt-1 text-[11px] px-2 py-0.5 font-black rounded border bg-slate-200 text-slate-600">未実施</span>
                    </div>
                    <div class="w-5/12">
                        <div id="modalWhiteTeam" class="font-black text-sm sm:text-base text-slate-800 truncate">白チーム</div>
                        <div id="modalWhiteSummary" class="text-xs text-slate-600 font-bold mt-0.5">0勝 (0本)</div>
                    </div>
                </div>

                <!-- ポジション別結果 -->
                <div class="overflow-x-auto">
                    <table class="w-full text-xs sm:text-sm border-collapse min-w-[400px]">
                        <thead>
                            <tr class="border-b bg-slate-50 text-slate-500 font-bold">
                                <th class="p-2 w-14 text-center">位置</th>
                                <th class="p-2 text-center">赤 取得部位</th>
                                <th class="p-2 w-20 text-center">勝敗</th>
                                <th class="p-2 text-center">白 取得部位</th>
                            </tr>
                        </thead>
                        <tbody id="modalPositionRows"></tbody>
                    </table>
                </div>
            </div>

            <div class="p-3 bg-slate-50 border-t border-slate-200 flex justify-end shrink-0">
                <button onclick="closeModal()" class="px-5 py-2 bg-slate-200 hover:bg-slate-300 rounded-xl text-xs sm:text-sm font-bold text-slate-700">閉じる</button>
            </div>
        </div>
    </div>

    <script>
        const positions = ['先鋒', '次鋒', '中堅', '副将', '大将'];
        let spectatorMatches = [];

        async function fetchSpectatorData() {
            let savedMap = new Map();

            // APIおよびlocalStorageの両方から結果データを検索収集
            try {
                const res = await fetch('/api/matches');
                if (res.ok) {
                    const apiData = await res.json();
                    apiData.forEach(m => savedMap.set(m.id, m));
                }
            } catch(e) {}

            try {
                const localData = JSON.parse(localStorage.getItem('kendo_matches')) || [];
                localData.forEach(m => {
                    if (m.id) savedMap.set(m.id, m);
                    const k1 = `${m.league}_${m.redTeam}_${m.whiteTeam}`;
                    const k2 = `${m.league}_${m.whiteTeam}_${m.redTeam}`;
                    savedMap.set(k1, m);
                    savedMap.set(k2, m);
                });
            } catch(e) {}

            // step2.htmlの定義ブロックを取得
            const leagueBlocks = getLeagueBlocksFromStorage();
            let matchList = [];

            leagueBlocks.forEach(block => {
                const leagueName = block.league;
                const teams = block.teams || [];

                if (teams.length >= 2) {
                    let matchIndex = 1;
                    for (let i = 0; i < teams.length; i++) {
                        for (let j = i + 1; j < teams.length; j++) {
                            const teamA = teams[i];
                            const teamB = teams[j];
                            const matchId = `${leagueName}_m${matchIndex}`;
                            const lookupKey = `${leagueName}_${teamA}_${teamB}`;

                            const saved = savedMap.get(matchId) || savedMap.get(lookupKey);

                            if (saved) {
                                matchList.push({
                                    ...saved,
                                    id: matchId,
                                    league: leagueName,
                                    title: `第${matchIndex}試合`,
                                    redTeam: teamA,
                                    whiteTeam: teamB
                                });
                            } else {
                                matchList.push({
                                    id: matchId,
                                    league: leagueName,
                                    title: `第${matchIndex}試合`,
                                    redTeam: teamA,
                                    whiteTeam: teamB,
                                    isFinished: false,
                                    positions: positions.map(p => ({ position: p, red: [], white: [], result: '引分' }))
                                });
                            }
                            matchIndex++;
                        }
                    }
                }
            });

            spectatorMatches = matchList;
            renderSpectatorView();
        }

        function getLeagueBlocksFromStorage() {
            const saved = localStorage.getItem('kendo_league_blocks') || localStorage.getItem('kendo_groups');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        return parsed.map(b => ({
                            league: b.league || b.name || b.league_name || 'Aリーグ',
                            teams: (b.teams || b.members || []).map(t => typeof t === 'string' ? t : (t.name || t.team_name))
                        }));
                    }
                } catch(e) {}
            }

            return [
                { league: 'Aリーグ', teams: ['春日市筑葉会', '大野東剣道スポーツ少年団', '太宰府振武会'] },
                { league: 'Bリーグ', teams: ['松武館', '北部少年剣道クラブ', '二天会道場'] },
                { league: 'Cリーグ', teams: ['須恵剣友会', '清流館', '上陽町少年剣道クラブ'] },
                { league: 'Dリーグ', teams: ['西牟田少年剣道クラブ', '黒津少年剣道クラブ', '志免心正会'] },
                { league: 'Eリーグ', teams: ['下妻剣道スポーツ少年団', '衛心館', '玄辰館道場'] },
                { league: 'Fリーグ', teams: ['上陽道場', '仁保剣友会', '大野北剣道スポーツ少年団'] },
                { league: 'Gリーグ', teams: ['篠栗少年剣道部', '宮竹少年剣道クラブ', '城島少年剣道部'] },
                { league: 'Hリーグ', teams: ['福岡一信館', '大橋一信館', '福岡十生館'] },
                { league: 'Iリーグ', teams: ['黒崎剣友会', '小倉正剣会', '八幡剣友会'] }
            ];
        }

        function calculatePosResult(redPts, whitePts) {
            let redCount = (redPts || []).filter(p => p !== '▲' && p !== 'CLEAR' && p !== '引分').length;
            let whiteCount = (whitePts || []).filter(p => p !== '▲' && p !== 'CLEAR' && p !== '引分').length;

            const redFouls = (redPts || []).filter(p => p === '▲').length;
            const whiteFouls = (whitePts || []).filter(p => p === '▲').length;

            whiteCount += Math.floor(redFouls / 2);
            redCount += Math.floor(whiteFouls / 2);

            if (redCount > whiteCount) return { text: '赤勝ち', class: 'bg-red-100 text-red-700 border-red-300', redPts: redCount, whitePts: whiteCount };
            if (whiteCount > redCount) return { text: '白勝ち', class: 'bg-indigo-100 text-indigo-700 border-indigo-300', redPts: redCount, whitePts: whiteCount };
            return { text: '引分', class: 'bg-amber-50 text-amber-700 border-amber-200', redPts: redCount, whitePts: whiteCount };
        }

        function calculateTeamSummary(positionsData) {
            let redWins = 0, whiteWins = 0, draws = 0;
            let redTotalPts = 0, whiteTotalPts = 0;
            let hasInput = false;

            (positionsData || []).forEach(pos => {
                const res = calculatePosResult(pos.red, pos.white);
                redTotalPts += res.redPts;
                whiteTotalPts += res.whitePts;

                if ((pos.red && pos.red.length > 0) || (pos.white && pos.white.length > 0)) hasInput = true;

                if (res.text === '赤勝ち') redWins++;
                else if (res.text === '白勝ち') whiteWins++;
                else draws++;
            });

            if (!hasInput) return { status: '未実施', hasInput: false, redWins: 0, whiteWins: 0, redTotalPts: 0, whiteTotalPts: 0 };

            let status = '引分';
            if (redWins > whiteWins) status = '赤勝ち';
            else if (whiteWins > redWins) status = '白勝ち';
            else {
                if (redTotalPts > whiteTotalPts) status = '赤勝ち';
                else if (whiteTotalPts > redTotalPts) status = '白勝ち';
                else status = '引分';
            }

            return { status, hasInput: true, redWins, whiteWins, redTotalPts, whiteTotalPts, draws };
        }

        function renderSpectatorView() {
            const container = document.getElementById('spectatorContainer');
            if (!spectatorMatches || spectatorMatches.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-slate-400 font-bold bg-white rounded-xl">対戦データがありません</div>';
                return;
            }

            const grouped = {};
            spectatorMatches.forEach((m, idx) => {
                m._idx = idx;
                if (!grouped[m.league]) grouped[m.league] = [];
                grouped[m.league].push(m);
            });

            const sortedLeagues = Object.keys(grouped).sort((a, b) => a.localeCompare(b, 'ja'));

            container.innerHTML = sortedLeagues.map(leagueName => {
                const matches = grouped[leagueName];
                matches.sort((a, b) => a.title.localeCompare(b.title, 'ja', { numeric: true }));

                return `
                    <div class="bg-white rounded-2xl p-4 sm:p-5 shadow-sm border border-slate-200">
                        <div class="flex items-center gap-2 mb-3 border-b border-slate-100 pb-2">
                            <span class="w-3 h-5 bg-indigo-600 rounded-full inline-block"></span>
                            <h3 class="text-base sm:text-lg font-black text-slate-900">${leagueName}</h3>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                            ${matches.map(m => renderMatchCardHtml(m)).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderMatchCardHtml(m) {
            const summary = calculateTeamSummary(m.positions);
            const isFinished = m.isFinished || (summary.hasInput && summary.status !== '未実施');

            let badgeHtml = `<span class="bg-slate-100 text-slate-500 text-[11px] px-2.5 py-0.5 rounded font-bold">試合前</span>`;
            let winnerText = "";
            let cardBg = "bg-white border-slate-200";

            if (isFinished) {
                cardBg = "bg-slate-50 border-slate-300";
                if (summary.status === '赤勝ち') {
                    badgeHtml = `<span class="bg-red-600 text-white text-[11px] px-2.5 py-0.5 rounded-full font-black">試合終了</span>`;
                    winnerText = `<div class="text-xs font-black text-red-600 truncate mt-1">🔴 勝者: ${m.redTeam}</div>`;
                } else if (summary.status === '白勝ち') {
                    badgeHtml = `<span class="bg-indigo-700 text-white text-[11px] px-2.5 py-0.5 rounded-full font-black">試合終了</span>`;
                    winnerText = `<div class="text-xs font-black text-indigo-800 truncate mt-1">⚪ 勝者: ${m.whiteTeam}</div>`;
                } else {
                    badgeHtml = `<span class="bg-amber-600 text-white text-[11px] px-2.5 py-0.5 rounded-full font-black">試合終了</span>`;
                    winnerText = `<div class="text-xs font-bold text-amber-700 mt-1">🤝 引き分け</div>`;
                }
            }

            return `
                <div class="p-3.5 rounded-xl border ${cardBg} shadow-xs cursor-pointer hover:border-indigo-300 transition" onclick="openDetailModal(${m._idx})">
                    <div class="flex justify-between items-center text-xs font-bold text-slate-500 mb-2">
                        <span>${m.title}</span>
                        ${badgeHtml}
                    </div>
                    <div class="flex justify-between items-center text-center my-1.5">
                        <div class="w-5/12 font-black text-sm text-slate-800 truncate">${m.redTeam}</div>
                        <div class="w-2/12 text-xs font-black text-slate-300">VS</div>
                        <div class="w-5/12 font-black text-sm text-slate-800 truncate">${m.whiteTeam}</div>
                    </div>
                    <div class="text-center">
                        ${winnerText || '<span class="text-[11px] text-indigo-600 font-bold">タップして詳細を見る</span>'}
                    </div>
                </div>
            `;
        }

        function openDetailModal(idx) {
            const match = spectatorMatches[idx];
            const summary = calculateTeamSummary(match.positions);

            document.getElementById('modalTitle').innerText = `${match.league} ${match.title}`;
            document.getElementById('modalRedTeam').innerText = match.redTeam;
            document.getElementById('modalWhiteTeam').innerText = match.whiteTeam;
            document.getElementById('modalRedSummary').innerText = `${summary.redWins}勝 (${summary.redTotalPts}本)`;
            document.getElementById('modalWhiteSummary').innerText = `${summary.whiteWins}勝 (${summary.whiteTotalPts}本)`;

            const badge = document.getElementById('modalResultBadge');
            if (summary.status === '赤勝ち') {
                badge.className = "mt-1 text-[11px] px-2 py-0.5 font-black rounded border bg-red-100 text-red-700 border-red-300";
                badge.innerText = "🔴 赤勝ち";
            } else if (summary.status === '白勝ち') {
                badge.className = "mt-1 text-[11px] px-2 py-0.5 font-black rounded border bg-indigo-100 text-indigo-800 border-indigo-300";
                badge.innerText = "⚪ 白勝ち";
            } else if (summary.status === '引分') {
                badge.className = "mt-1 text-[11px] px-2 py-0.5 font-black rounded border bg-amber-100 text-amber-800 border-amber-300";
                badge.innerText = "🤝 引分け";
            } else {
                badge.className = "mt-1 text-[11px] px-2 py-0.5 font-black rounded border bg-slate-200 text-slate-600";
                badge.innerText = "未実施";
            }

            const tbody = document.getElementById('modalPositionRows');
            tbody.innerHTML = '';

            positions.forEach((pName, pIdx) => {
                const pos = (match.positions && match.positions[pIdx]) || { red: [], white: [] };
                const res = calculatePosResult(pos.red, pos.white);

                const tr = document.createElement('tr');
                tr.className = 'border-b hover:bg-slate-50';
                tr.innerHTML = `
                    <td class="p-2 font-bold text-center bg-slate-100 text-slate-700">${pName}</td>
                    <td class="p-2 text-center font-bold text-red-600">${(pos.red || []).join(' ') || '-'}</td>
                    <td class="p-2 text-center"><span class="text-[11px] px-2 py-0.5 font-bold rounded border ${res.class}">${res.text}</span></td>
                    <td class="p-2 text-center font-bold text-indigo-800">${(pos.white || []).join(' ') || '-'}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('detailModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
        }

        // 定期的に最新データを自動同期（5秒ごと）
        fetchSpectatorData();
        setInterval(fetchSpectatorData, 5000);
    </script>
</body>
</html>
