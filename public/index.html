<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>少年剣道大会 申込フォーム</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-6">

    <div class="max-w-3xl mx-auto bg-white p-8 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold text-center mb-8 border-b pb-4 text-indigo-900">🎌 少年剣道大会 申込フォーム</h1>

        <form action="#" method="POST" id="entryForm" class="space-y-8">
            
            <section class="bg-indigo-50 p-6 rounded-md border border-indigo-100">
                <h2 class="text-lg font-semibold mb-4 flex items-center">🏛️ チーム・所属情報</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">チーム名（プログラム掲載用） <span class="text-red-500">*</span></label>
                        <p class="text-xs text-gray-500 mb-2">※大会プログラムやトーナメント表に表示される名前です。</p>
                        <input type="text" name="team_name" required class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:ring-indigo-500 focus:border-indigo-500" placeholder="例：福岡武道館A、福岡剣道クラブ">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">母体団体名（道場・学校名） <span class="text-red-500">*</span></label>
                        <p class="text-xs text-gray-500 mb-2">※組み合わせ作成時、同じ母体のチームが対戦しないように自動調整されます。</p>
                        <input type="text" name="base_organization" required class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:ring-indigo-500 focus:border-indigo-500" placeholder="例：福岡武道館">
                    </div>
                </div>
            </section>

            <section>
                <div class="flex justify-between items-end mb-4">
                    <h2 class="text-lg font-semibold border-l-4 border-indigo-600 pl-2">1. 参加部門の選択 <span class="text-red-500 text-sm">*</span></h2>
                    <span class="text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded">※複数選択可</span>
                </div>
                <div class="space-y-3">
                    <label class="flex items-start p-3 border rounded-md cursor-pointer hover:bg-gray-50 transition">
                        <input type="checkbox" name="category[]" value="low_elem" class="category-checkbox mt-1 mr-3 w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500">
                        <div>
                            <span class="font-medium">① 小学生低学年</span>
                            <p class="text-sm text-gray-500">3人制（先鋒・中堅・大将） / 男女混合可 / 4年生以上</p>
                        </div>
                    </label>
                    <label class="flex items-start p-3 border rounded-md cursor-pointer hover:bg-gray-50 transition">
                        <input type="checkbox" name="category[]" value="elem" class="category-checkbox mt-1 mr-3 w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500">
                        <div>
                            <span class="font-medium">② 小学生団体</span>
                            <p class="text-sm text-gray-500">5人制 / 男女混合可 / 学年制限なし</p>
                        </div>
                    </label>
                    <label class="flex items-start p-3 border rounded-md cursor-pointer hover:bg-gray-50 transition">
                        <input type="checkbox" name="category[]" value="mid" class="category-checkbox mt-1 mr-3 w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500">
                        <div>
                            <span class="font-medium">③ 中学生団体</span>
                            <p class="text-sm text-gray-500">5人制 / 男女混合可 / 1・2年生のみ</p>
                        </div>
                    </label>
                    <label class="flex items-start p-3 border rounded-md cursor-pointer hover:bg-gray-50 transition">
                        <input type="checkbox" name="category[]" value="mid_girls" class="category-checkbox mt-1 mr-3 w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500">
                        <div>
                            <span class="font-medium">④ 中学女子団体</span>
                            <p class="text-sm text-gray-500">3人制（先鋒・中堅・大将） / 男女混合可 / 1・2年生のみ</p>
                        </div>
                    </label>
                </div>
                <p id="categoryError" class="text-red-500 text-sm mt-2 hidden">※参加部門を少なくとも1つ選択してください。</p>
            </section>

            <hr class="border-gray-200">

            <section>
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-semibold border-l-4 border-indigo-600 pl-2">2. 審判員の登録</h2>
                    <button type="button" id="addRefereeBtn" class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-md text-sm font-medium hover:bg-indigo-200 transition">
                        ＋ 追加
                    </button>
                </div>
                <div id="refereeContainer" class="space-y-3">
                    <div class="referee-row flex flex-wrap gap-3 items-end bg-gray-50 p-3 rounded-md border">
                        <div class="flex-1 min-w-[150px]">
                            <label class="block text-xs font-medium text-gray-700 mb-1">審判員名</label>
                            <input type="text" name="referee_name[]" class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:ring-indigo-500" placeholder="例：山田 太郎">
                        </div>
                        <div class="w-32">
                            <label class="block text-xs font-medium text-gray-700 mb-1">段位</label>
                            <select name="referee_dan[]" class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:ring-indigo-500">
                                <option value="">選択</option>
                                <option value="初段">初段</option>
                                <option value="二段">二段</option>
                                <option value="三段">三段</option>
                                <option value="四段">四段</option>
                                <option value="五段">五段</option>
                                <option value="六段">六段</option>
                                <option value="七段">七段</option>
                                <option value="八段">八段</option>
                            </select>
                        </div>
                        <div class="w-32">
                            <label class="block text-xs font-medium text-gray-700 mb-1">称号</label>
                            <select name="referee_title[]" class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:ring-indigo-500">
                                <option value="なし">なし</option>
                                <option value="錬士">錬士</option>
                                <option value="教士">教士</option>
                                <option value="範士">範士</option>
                            </select>
                        </div>
                        <button type="button" class="remove-btn text-red-500 p-2 hover:bg-red-50 rounded-md hidden">
                            削除
                        </button>
                    </div>
                </div>
            </section>

            <hr class="border-gray-200">

            <section>
                <h2 class="text-lg font-semibold mb-4 border-l-4 border-indigo-600 pl-2">3. 代表者の登録 <span class="text-red-500 text-sm">*</span></h2>
                <div class="grid grid-cols-1 gap-4 bg-gray-50 p-4 rounded-md border">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">氏名</label>
                        <input type="text" name="rep_name" required class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:ring-indigo-500" placeholder="例：鈴木 一郎">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">住所</label>
                        <input type="text" name="rep_address" required class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:ring-indigo-500" placeholder="例：福岡県福岡市...">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">電話番号</label>
                        <input type="tel" name="rep_phone" required class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:ring-indigo-500" placeholder="例：090-XXXX-XXXX">
                    </div>
                </div>
            </section>

            <div class="pt-6">
                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 shadow-lg transition">
                    この内容で申し込む
                </button>
            </div>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- 審判員の追加・削除機能 ---
            const addBtn = document.getElementById('addRefereeBtn');
            const container = document.getElementById('refereeContainer');

            const toggleRemoveButtons = () => {
                const rows = container.querySelectorAll('.referee-row');
                rows.forEach((row) => {
                    const removeBtn = row.querySelector('.remove-btn');
                    if (rows.length > 1) {
                        removeBtn.classList.remove('hidden');
                    } else {
                        removeBtn.classList.add('hidden');
                    }
                });
            };

            addBtn.addEventListener('click', () => {
                const firstRow = container.querySelector('.referee-row');
                const newRow = firstRow.cloneNode(true);
                
                newRow.querySelectorAll('input, select').forEach(input => {
                    input.value = input.tagName === 'SELECT' ? (input.name.includes('title') ? 'なし' : '') : '';
                });

                const removeBtn = newRow.querySelector('.remove-btn');
                removeBtn.addEventListener('click', () => {
                    newRow.remove();
                    toggleRemoveButtons();
                });

                container.appendChild(newRow);
                toggleRemoveButtons();
            });

            const initialRemoveBtn = container.querySelector('.remove-btn');
            initialRemoveBtn.addEventListener('click', function() {
                this.closest('.referee-row').remove();
                toggleRemoveButtons();
            });

          // --- 参加部門の必須チェック ＆ データ送信処理 ---
            const form = document.getElementById('entryForm');
            const categoryError = document.getElementById('categoryError');

            form.addEventListener('submit', async (e) => {
                e.preventDefault(); // 常にブラウザの標準送信（画面遷移）を防止！
                
                const checkboxes = document.querySelectorAll('.category-checkbox');
                const isChecked = Array.from(checkboxes).some(cb => cb.checked);
                
                if (!isChecked) {
                    categoryError.classList.remove('hidden');
                    categoryError.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    return; // 部門が選ばれていなければここで処理をストップ
                }
                
                categoryError.classList.add('hidden');

                // フォームに入力されたデータを収集
                const formData = new FormData(form);
                const data = {};
                formData.forEach((value, key) => {
                    // 複数選択のチェックボックスなどの処理
                    if (data[key]) {
                        if (!Array.isArray(data[key])) {
                            data[key] = [data[key]];
                        }
                        data[key].push(value);
                    } else {
                        data[key] = value;
                    }
                });

                // 審判員のデータをリストとして収集
                const referees = [];
                container.querySelectorAll('.referee-row').forEach(row => {
                    const name = row.querySelector('input[name="refereeName[]"]')?.value;
                    const dan = row.querySelector('select[name="refereeDan[]"]')?.value;
                    const title = row.querySelector('select[name="refereeTitle[]"]')?.value;
                    if (name) {
                        referees.push({ name, dan, title });
                    }
                });
                data.referees = referees;

                try {
                    // 🚀 Supabase連携しているサーバーのAPIにデータを送信！
                    const response = await fetch('/api/match', { // ※実際の保存用APIエンドポイント名に合わせてください
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(data),
                    });

                    if (response.ok) {
                        // 送信が成功したら、完了画面に移動する
                        window.location.href = '/admin_finish.html';
                    } else {
                        const errText = await response.text();
                        alert('エラーが発生しました: ' + errText);
                    }
                } catch (error) {
                    console.error('送信エラー:', error);
                    alert('送信中にエラーが発生しました。接続を確認してください。');
                }
            });

            document.querySelectorAll('.category-checkbox').forEach(cb => {
                cb.addEventListener('change', () => {
                    categoryError.classList.add('hidden');
                });
            });
    </script>
</body>
</html>
