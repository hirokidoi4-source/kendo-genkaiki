<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大会結果 配信パネル - 運営用</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans p-6">

    <div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow-xl border-t-8 border-indigo-600">
        <h1 class="text-2xl font-bold text-center mb-2 text-indigo-900">📡 大会結果 配信コントロールパネル</h1>
        <p class="text-center text-sm text-gray-500 mb-8">ここで確定したデータが、観客のスマホへ自動的に反映されます。</p>

        <form id="resultForm" class="space-y-6">
            
            <div class="bg-gray-50 p-4 rounded-md border border-gray-200">
                <label class="block text-sm font-bold text-gray-700 mb-1">大会名（部門）</label>
                <input type="text" id="inp_title" value="第21回 宗像少年剣道大会（中学生の部）" class="w-full border-gray-300 rounded-md shadow-sm p-3 border focus:ring-indigo-500 focus:border-indigo-500 font-bold">
            </div>

            <div class="grid grid-cols-1 gap-4">
                <div class="flex items-center gap-4 bg-yellow-50 p-4 rounded-md border border-yellow-200">
                    <span class="text-2xl">🥇</span>
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-yellow-800 mb-1">優勝チーム</label>
                        <input type="text" id="inp_winner" placeholder="例：福岡武道館A" class="w-full border-yellow-300 rounded-md shadow-sm p-2 border focus:ring-yellow-500 font-bold text-lg">
                    </div>
                </div>

                <div class="flex items-center gap-4 bg-gray-50 p-4 rounded-md border border-gray-200">
                    <span class="text-2xl">🥈</span>
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-gray-600 mb-1">準優勝チーム</label>
                        <input type="text" id="inp_runner_up" placeholder="例：博多第一中" class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:ring-gray-500 font-bold text-lg">
                    </div>
                </div>

                <div class="flex items-center gap-4 bg-orange-50 p-4 rounded-md border border-orange-200">
                    <span class="text-2xl">🥉</span>
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-orange-800 mb-1">第3位（1チーム目）</label>
                        <input type="text" id="inp_third_1" placeholder="例：桜剣友会" class="w-full border-orange-300 rounded-md shadow-sm p-2 border focus:ring-orange-500 font-bold text-lg">
                    </div>
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-orange-800 mb-1">第3位（2チーム目）</label>
                        <input type="text" id="inp_third_2" placeholder="例：天神剣道クラブA" class="w-full border-orange-300 rounded-md shadow-sm p-2 border focus:ring-orange-500 font-bold text-lg">
                    </div>
                </div>
            </div>

            <div class="pt-4 border-t border-gray-200">
                <label class="block text-sm font-bold text-gray-700 mb-2">現在の大会ステータス</label>
                <div class="flex gap-4">
                    <label class="flex-1 cursor-pointer">
                        <input type="radio" name="status" value="ongoing" class="peer hidden" checked>
                        <div class="text-center p-3 border-2 border-gray-200 rounded-md peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:text-blue-700 font-bold transition">
                            ⚔️ 試合進行中
                        </div>
                    </label>
                    <label class="flex-1 cursor-pointer">
                        <input type="radio" name="status" value="finished" class="peer hidden">
                        <div class="text-center p-3 border-2 border-gray-200 rounded-md peer-checked:border-red-500 peer-checked:bg-red-50 peer-checked:text-red-700 font-bold transition">
                            🏆 全試合終了（結果発表）
                        </div>
                    </label>
                </div>
            </div>

            <button type="submit" class="w-full mt-8 bg-gradient-to-r from-indigo-600 to-blue-600 text-white font-black text-xl py-4 rounded-lg shadow-lg hover:from-indigo-700 hover:to-blue-700 transform hover:scale-[1.02] transition-all flex justify-center items-center gap-2">
                📡 この結果を観客のスマホへ一斉配信
            </button>
        </form>
    </div>

    <script>
        document.getElementById('resultForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // 画面の自動リロードを防ぐ

            // フォームの入力内容を取得
            const payload = {
                title: document.getElementById('inp_title').value,
                winner: document.getElementById('inp_winner').value,
                runner_up: document.getElementById('inp_runner_up').value,
                third_place_1: document.getElementById('inp_third_1').value,
                third_place_2: document.getElementById('inp_third_2').value,
                status: document.querySelector('input[name="status"]:checked').value
            };

            try {
                // index.js (Node.js) へPOSTリクエストでデータを送る
                const response = await fetch('/api/results', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert('🎉 観客画面への配信が完了しました！');
                } else {
                    alert('❌ エラーが発生しました。');
                }
            } catch (error) {
                console.error('通信エラー:', error);
                alert('サーバーに接続できません。');
            }
        });
    </script>
</body>
</html>
